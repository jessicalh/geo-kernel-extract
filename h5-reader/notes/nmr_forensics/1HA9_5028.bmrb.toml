# Provenance block — 1HA9_5028 BMRB translation (narrative)
#
# Protein: MCoTI-II (Momordica cochinchinensis Trypsin Inhibitor II), a
# macrocyclic knottin peptide naturally cyclic at the backbone. The 1HA9
# linear PDB representation starts at a permutation point of the cyclic
# backbone (per tag_alignment.json `tag_summary`). 34 residues, 6 CYS
# (residues 8, 15, 21, 25, 27, 33) likely forming 3 disulfide bridges in
# the cystine knot.
#
# PDB 1HA9 deposited 2001-04-02. SYNONYM MCOTI-II, OTHER_DETAILS "SQUASH
# TRYPSIN INHIBITOR".
#
# tag_alignment.json: tag_free=true; bmrb_sequence (34aa) ==
# native_sequence (34aa); identity. offset = 0.
#
# CRUCIAL TOPOLOGY DETAIL — non-zwitterionic termini.
# CHARMM SER-1 has HN (single backbone amide H), N, CA, ... — *not* the
# linear-peptide H1/H2/H3 (NH3+) seen in 1DV0/1HS5/1HD6/1B1V. CHARMM GLY-34
# has N, CA, C, O, HN, HA1, HA2 — *not* OT1/OT2 (carboxylate) seen in
# linear C-termini.
# This reflects the cyclic origin: the MD prep treated MCoTI-II as a
# linear permutation of the cyclic backbone with mid-chain-style chemistry
# at both ends, not as a free linear zwitterion. Therefore SER-1 backbone
# H exists (matches BMRB row "1, SER, H, 8.85") and no N-terminal NH3+
# anomaly fires.
#
# 0 HIS — no HSP adjudication. 2 PRO at residues 9, 22.
#
# 186 BMRB rows, all H. Pure proton deposition.

