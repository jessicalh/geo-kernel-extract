NAME_TRANSLATION_APPLIED, 45 STEREO_AMBIGUOUS, 12 ONE_TO_MANY. CHARMM
coverage: H 210/227 (92%); C/N/O/S 0 (proton-only deposition).

Resolutions (PRINCIPLES §6):
- §6.4 document-and-carry (0 rows): no UNMATCHED. The cyclic-origin
