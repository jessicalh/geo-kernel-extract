1HA9_5028 — MCoTI-II macrocyclic knottin peptide (squash trypsin
inhibitor), 34-residue. Identity numbering, offset = 0. 186 BMRB rows all
H. 6 CYS (3 disulfide bridges in cystine knot), 2 PRO, 0 HIS.

