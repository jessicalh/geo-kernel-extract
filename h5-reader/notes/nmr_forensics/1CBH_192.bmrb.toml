findings_summary = """
1CBH_192 — Cellobiohydrolase I cellulose-binding domain (T. reesei),
36-residue. 1989 deposition (oldest in the calibration set). Identity
numbering, offset = 0. 188 BMRB rows all H.

Audit run 2026-04-20: 188 rows = 61 MATCHED + 86 MATCHED_WITH_ANOMALIES
+ 15 ONE_TO_MANY + 26 STEREO_AMBIGUOUS + 0 UNMATCHED. Anomalies: 107
NAME_TRANSLATION_APPLIED, 26 STEREO_AMBIGUOUS (all ambig=2), 15
ONE_TO_MANY, 6 RESIDUE_ALIAS_APPLIED (HSP→HIS at residue 4). CHARMM
coverage: H 218/236 (92%); C/N/O/S 0 (proton-only).

Resolutions (PRINCIPLES §6):
- §6.4 document-and-carry (0 rows): no UNMATCHED. THR-1 silent N-term
  (BMRB rows HA, HB, HG2 only; CHARMM has H1/H2/H3 NH3+).
- §6.3 deferred (15 rows): ONE_TO_MANY methyl-pseudo expansion.
- §6.3 deferred (26 rows): STEREO_AMBIGUOUS, all ambig=2 (14% of rows;
  intermediate among reviewed proteins). Depositor DID deposit ambig
  codes here (156 code-1, 32 code-2 across 188 rows) — distinct from
  1G26 which deposited none.
- §6.3 deferred (6 rows): RESIDUE_ALIAS_APPLIED on HIS-4 (HSP→HIS); all
  6 BMRB rows (H, HA, HB2, HB3, HD2 = 6.82, HE1 = 8.56) bound to CHARMM
  HSP atoms via alias. Same untestable-protonation pattern as 1G26
  (HD1/HE2 ring N-Hs absent from BMRB).
- §6.1 adjudicated (none).

Cross-cutting: 0 RefDB corrections — trivially consistent.

Note: BMRB id 192 is a single-digit early entry. The audit found no
naming surprises beyond what the starter table covers, but the Huxley
discipline applied with extra caution for legacy convention drift.
