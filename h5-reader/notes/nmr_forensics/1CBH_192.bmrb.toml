    "prep/tag_alignment.json: tag_free=true; bmrb_sequence (36aa) == native_sequence (36aa); chain A length 36; alignment_matches=36",
    "BMRB CSV inspection: 188 rows for bmrb_id=192, all H; residues 1..36 names align with CHARMM 1..36 identity (modulo HSP→HIS at residue 4)",
