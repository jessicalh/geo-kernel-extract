# Provenance block — 1CBH_192 BMRB translation (narrative)
#
# Protein: Cellobiohydrolase I (CBH-I) C-terminal domain — cellulose-binding
# module from Trichoderma reesei. 36-residue domain, PDB 1CBH deposited
# 1989-05-30 (oldest deposition in the 10-protein calibration set);
# ENGINEERED YES. EC 3.2.1.91 (cellulase). tag_alignment.json: tag_free=true;
# bmrb_sequence (36aa, TQSHYGQCGGIGYSGPTVCASGTTCQVLNPYYSQCL) ==
# native_sequence (36aa); identity.
#
# BMRB id 192 — single-digit BMRB number, indicating an entry from the
# very early days of BMRB. Naming conventions and metadata standards
# from this era are notably less complete than modern depositions.
#
# Numbering: identity. offset = 0.
#
# **HSP at residue 4** (CHARMM doubly-protonated). Same pattern as 1G26's
# HSP-3: BMRB deposits ring CARBON Hs only (HD2 = 6.82 ppm, HE1 = 8.56 ppm)
# — NO HD1 (Nδ1-H), NO HE2 (Nε2-H). HSP/HSD/HSE protonation untestable
# from NMR data alone. 6 RESIDUE_ALIAS_APPLIED expected on HIS-4 rows.
#
# THR-1 N-terminus: CHARMM has H1/H2/H3 (NH3+). BMRB row 1 deposits HA,
# HB, HG2 only — silent-omit strategy (1HD6/1B1V/1G26 family).
#
# 4 CYS at residues 8, 19, 25, 35 — likely 2 disulfide bridges. CHARMM
# CYS uniform; no alias.

