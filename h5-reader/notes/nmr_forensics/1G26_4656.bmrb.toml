# Provenance block — 1G26_4656 BMRB translation (narrative)
#
# Protein: Granulin A N-terminal subdomain, 31-residue designed peptide
# (PDB COMPND: ENGINEERED YES, MUTATION YES; FRAGMENT "N-TERMINAL DOMAIN
# (RESIDUES 1-31)"; SYNONYM HGA). PDB 1G26 deposited 2000-10-17.
# tag_alignment.json: tag_free=true; bmrb_sequence (31aa,
# VVHCDMEVICPDGYTCCRLPSGAWGCCPFTQ) == native_sequence (31aa); identity.
#
# Numbering: identity. offset = 0.
#
# **HSP at residue 3** (CHARMM doubly-protonated HIS; +1 charge) — first
# HSP exemplar in the audit. CHARMM ring atoms: HD1 (on ND1), HD2 (on CD2),
# HE1 (on CE1), HE2 (on NE2) — all four ring Hs present per HSP topology.
# BMRB depositor put `HIS` (no protonation indication) and assigned only
# the ring CARBON Hs (HD2 = 7.28 ppm, HE1 = 8.6 ppm) — NO HD1 (Nδ1-H) and
# NO HE2 (Nε2-H). The two ring N-Hs are exchangeable in solution and rarely
# resolved at neutral pH; their absence is conventional, not a signal.
#
# Therefore the CHARMM HSP choice CANNOT BE TESTED against the NMR data.
# The audit will fire RESIDUE_ALIAS_APPLIED on every HIS row at residue 3
# (HSP→HIS canonicalisation) — that is the loud-and-honest signal that an
# untested protonation choice is in play. Adjudication: deferred downstream;
# document the prep-time choice and that NMR cannot constrain it.
#
# VAL-1 N-terminus: CHARMM has H1/H2/H3 (NH3+ zwitterion). BMRB row 1
# deposits HA, HB, HG1, HG2 — silent-omit strategy (1HD6/1B1V family).
# No N-terminal anomaly fires.
#
# 6 CYS at residues 4, 10, 16, 17, 26, 27 — likely 3 disulfide bridges
# (1G26 is a designed disulfide-stabilised β-hairpin). CHARMM CYS naming
# uniform; no alias.

