    "prep/tag_alignment.json: tag_free=true; bmrb_sequence (31aa) == native_sequence (31aa); chain A length 31; alignment_matches=31",
    "BMRB CSV inspection: 166 rows for bmrb_id=4656, all H; residues 1..31 names align with CHARMM 1..31 identity (modulo HSP→HIS alias at residue 3); BMRB title indicates pure proton deposition",
    "HIS-3 BMRB rows: H, HA, HB2, HB3, HD2 (7.28), HE1 (8.6) — NO HD1, NO HE2 (ring N-H exchangeables not assigned). Cannot constrain HSP/HSD/HSE protonation from NMR data alone.",
