]
findings_summary = """
1G26_4656 — Granulin A N-terminal designed peptide (cytokine fragment),
31-residue. Identity numbering, offset = 0. 166 BMRB rows all H.

Audit run 2026-04-20: 166 rows = 51 MATCHED + 102 MATCHED_WITH_ANOMALIES
+ 13 ONE_TO_MANY + 0 STEREO_AMBIGUOUS + 0 UNMATCHED. Anomalies: 99
NAME_TRANSLATION_APPLIED, 13 ONE_TO_MANY, 6 RESIDUE_ALIAS_APPLIED. CHARMM
coverage: H 192/211 (91%); C/N/O/S 0 (proton-only).

Resolutions (PRINCIPLES §6):
- §6.4 document-and-carry (0 rows): no UNMATCHED. VAL-1 silent N-term
  (no backbone H deposited; CHARMM has H1/H2/H3 but nothing to bind).
- §6.3 deferred (13 rows): ONE_TO_MANY methyl-pseudo expansion.
- §6.3 deferred (0 rows): no STEREO_AMBIGUOUS — see AI observation on
  ambiguity-code absence.
- §6.3 deferred (6 rows): RESIDUE_ALIAS_APPLIED on HIS-3 (HSP → HIS).
  All 6 BMRB HIS-3 rows (H, HA, HB2, HB3, HD2, HE1) bound correctly to
  CHARMM HSP atoms via the alias. Adjudication impossible: BMRB did NOT
  deposit HD1 (Nδ1-H) or HE2 (Nε2-H) — the two ring N-Hs that would
  distinguish HSP/HSD/HSE. CHARMM's HSP choice is a prep-time decision
  with no NMR evidence either way. Document-and-carry; downstream
  policy decides.
- §6.1 adjudicated (none): starter table sufficed; HSP alias worked.

Cross-cutting: 0 RefDB corrections — trivially consistent.
"""

