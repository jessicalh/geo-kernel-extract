# RefDB .str.corr file header metadata (parsed from the # comment block).
# These fields describe what SHIFTCOR/SHIFTX applied to the original BMRB
# deposition to produce the re-referenced values in refdb_<id>.csv.

bmrb_id = 3449
reference_pdb = "1BWX_"

[offsets_applied]
# Offsets that were ADDED to original BMRB shifts to produce RefDB values.
# Values: number in ppm, or 'N/A' if no correction applied to that nucleus.
HA = "N/A"
CA = "N/A"
CB = "N/A"
CO = "N/A"
N = "N/A"
HN = "N/A"

[avg_difference_obs_minus_pred]
# Average chemical-shift difference between corrected observation and
# SHIFTX prediction, per nucleus (ppm).
HA = "-0.12"
CA = "N/A"
CB = "N/A"
CO = "N/A"
N = "N/A"
HN = "-0.05"
