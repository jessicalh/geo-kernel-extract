    "prep/tag_alignment.json: tag_free=true; bmrb_sequence (34aa) != native_sequence_length=34; chain A length 39; alignment_matches=34 — 5-residue gap (CHARMM has 35-39: VAL ALA LEU GLY ALA, BMRB silent there)",
    "BMRB title: 'Stabilized NMR structure of human parathyroid hormone(1-34)' — explicit 1-34 coverage despite PDB topology being 1-39",
    "BMRB CSV inspection: 225 rows for bmrb_id=3449, all H; residues 1..34 names align with CHARMM 1..34 identity (modulo HSP→HIS at 9, 14, 32); residues 35..39 BMRB-silent",
    "HIS-9, HIS-14, HIS-32 BMRB rows: 6 each (H, HA, HB2, HB3, HD2, HE1) — all three with ring N-Hs absent",
    "SER-1 BMRB rows: HA, HB2, HB3 — silent N-term omit",
