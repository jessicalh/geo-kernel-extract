# Provenance block — 1BWX_3449 BMRB translation (narrative)
#
# Protein: Human Parathyroid Hormone (PTH) — peptide hormone. 39-residue
# fragment per source PDB COMPND ("FRAGMENT: RESIDUES 1-39", ENGINEERED YES).
# BMRB title is explicit "Stabilized NMR structure of human parathyroid
# hormone(1-34)" — BMRB assignments only cover residues 1-34, not the full
# 39-residue topology in CHARMM.
#
# tag_alignment.json: tag_free=true; bmrb_sequence (34aa,
# SVSEIQLMHNLGKHLNSMERVEWLRKKLQDVHNF) == native_sequence (34aa);
# alignment_matches=34; chain_length=39 — **5-residue C-terminal extension**
# in CHARMM (residues 35-39: VAL ALA LEU GLY ALA) is BMRB-silent (PTH(1-39)
# topology vs PTH(1-34) deposition). Same pattern as 1HS5 (CHARMM 34 vs
# BMRB 33), but with a 5-residue gap.
#
# Numbering: identity for residues 1-34. offset = 0. CHARMM residues 35-39
# carry no BMRB rows; no anomaly fires (nothing to bind).
#
# **3 HSP residues** at positions 9, 14, 32 (CHARMM doubly-protonated; all
# three with full ring atom set HD1, HD2, HE1, HE2). BMRB rows for each:
# H, HA, HB2, HB3, HD2, HE1 — six rows × 3 = 18 RESIDUE_ALIAS_APPLIED
# expected. Ring N-Hs (HD1, HE2) ABSENT for all three; protonation
# untestable from NMR (cumulative pattern across 1G26/1CBH/1I2V/1I8X/1BWX
# — five HSP exemplars with the same data gap).
#
# SER-1 N-terminus: CHARMM has H1/H2/H3 (NH3+); BMRB row 1 deposits
# HA, HB2, HB3 only — silent-omit N-term.
#
# **No CYS, no PRO** — first reviewed protein without disulfide-rich
# topology and the first without prolines. The PTH hormone is a flexible
# soluble hormone, structurally distinct from the cysteine-knot/disulfide
# peptides reviewed previously (1HD6, 1B1V, 1HA9, 1G26, 1CBH, 1I2V, 1I8X).
#
# Ambig codes: 145 code-1, 80 code-2 (well-deposited, 36% stereo-ambig).

