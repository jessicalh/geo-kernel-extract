C-term silent gap: residues 35-39 = VAL ALA LEU GLY ALA). Identity
numbering on 1-34 overlap; offset = 0. 225 BMRB rows all H.

Audit run 2026-04-20: 225 rows = 51 MATCHED + 80 MATCHED_WITH_ANOMALIES
+ 20 ONE_TO_MANY + 74 STEREO_AMBIGUOUS + 0 UNMATCHED. Anomalies: 135
NAME_TRANSLATION_APPLIED, 74 STEREO_AMBIGUOUS (33%), 20 ONE_TO_MANY, 18
RESIDUE_ALIAS_APPLIED (3 HSP × 6 BMRB rows). CHARMM coverage: H 265/330
(80% — slightly lower because 5 silent C-term residues count in topology).

Resolutions (PRINCIPLES §6):
- §6.4 document-and-carry (0 rows): no UNMATCHED. SER-1 silent N-term;
  C-term residues 35-39 BMRB-silent (no rows, nothing fires).
- §6.3 deferred (20 rows): ONE_TO_MANY methyl-pseudo expansion.
- §6.3 deferred (74 rows): STEREO_AMBIGUOUS, all ambig=2 (33% of rows).
  Depositor put ambig codes on 80 rows; 145 with ambig=1.
- §6.3 deferred (18 rows): RESIDUE_ALIAS_APPLIED on HIS-9, HIS-14,
  HIS-32 (HSP→HIS for all three). Same 6-rows-per-HSP pattern; ring
  N-Hs absent for all three; protonation untestable for all three.
  Most HSP-heavy of any reviewed protein (3 HSP residues; 1G26/1CBH/
  1I2V/1I8X each had 1).
- §6.1 adjudicated (none).

Cross-cutting: 0 RefDB corrections — trivially consistent.
