# Provenance block — 1I8X_4351 BMRB translation (narrative)
#
# Protein: Granulin-1 (Carp) N-terminal 30-residue fragment — CG1 1-30
# peptide. Cytokine family granulin (PDB COMPND: MOLECULE GRANULIN-1,
# FRAGMENT "N-TERMINUS (RESIDUES 1-30)", ENGINEERED YES, MUTATION YES;
# from carp). PDB 1I8X deposited 2001-03-16. Structure determined via
# semi-automatic ARIA NOE assignment.
# tag_alignment.json: tag_free=true; bmrb_sequence (30aa,
# VIHCDAATICPDGTTCSLSPYGVWYCSPFS) == native_sequence (30aa); identity.
#
# Numbering: identity. offset = 0.
#
# **HSP at residue 3** — same residue position as 1G26's HSP-3 (also
# granulin family). BMRB rows for HIS-3: H, HA, HB2, HB3, HD2 (7.30 ppm),
# HE1 (8.64 ppm), CA (56.48), CB (30.08). Ring N-Hs (HD1, HE2) absent —
# protonation untestable from NMR (same pattern as 1G26/1CBH/1I2V).
# 8 RESIDUE_ALIAS_APPLIED expected (6 H + 2 C rows on HIS-3).
#
# VAL-1 N-terminus: CHARMM has H1/H2/H3 (NH3+); BMRB row 1 deposits
# CA, CB, HA, HB, HG1, HG2 — silent-omit N-term.
#
# 4 CYS at residues 4, 10, 16, 26 — likely 2 disulfide bridges. CHARMM
# CYS uniform.
#
# **First H+C deposition** in the latter half of the audit set (53 C
# rows joining 151 H = 204 total). C coverage adds the diagnostic to
# spot-check BMRB-CSV-vs-RefDB-corrected pattern on C and H rows
# separately.
#
# 38 of 204 rows have ambig=2; 166 have ambig=1 — depositor deposited
# ambig codes properly (1HD6/1B1V/1CBH family, not 1G26/1I2V silence).

