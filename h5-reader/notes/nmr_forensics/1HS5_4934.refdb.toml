# Provenance block — 1HS5_4934 RefDB translation (narrative)
#
# RefDB inherits BMRB 4934's identity numbering (offset = 0). 159 rows for
# bmrb_id=4934 in refdb_corrected_shifts_685.csv.
#
# Confirmed (post-audit cross-check): BMRB CSV `shift_value` matches RefDB
# `corrected_value` for all 96 rows where corrected ≠ original (0 match
# original). chemical_shifts_685.csv is the post-RefDB-correction number
# where RefDB coverage exists. 1DV0 verified to follow the same pattern
# (125/125 → corrected). Therefore: for downstream analysis, BMRB and
# RefDB are *operationally equivalent on shift values* for re-referenced
# rows. RefDB is informative as the change-log (which rows were
# re-referenced and by how much), not as a separate truth source.

[provenance]
protein = "1HS5_4934"
database = "refdb"
reviewed_date = "2026-04-19"
reviewer = "claude (session 2026-04-19, Opus 4.7)"
metadata_sources_consulted = [
    "reference.pdb TITLE: 'CELLULAR TUMOR ANTIGEN P53 in water'",
    "BMRB provenance block above — RefDB inherits the offset = 0 (no construct correction)",
    "refdb_corrected_shifts_685.csv: 159 rows for bmrb_id=4934; spot-check ASP-1 CA original=54.10, corrected=54.56",
]
findings_summary = """
RefDB 4934 — 159 rows. Audit run 2026-04-19: 30 MATCHED + 128
MATCHED_WITH_ANOMALIES + 1 UNMATCHED_ROW. CHARMM coverage: C 63/178,
H 62/278, N 33/55, O 0/57.

Anomaly tally:
- REFDB_CORRECTED_VALUE_DIFFERS: 96 (60% of rows). Re-referencing magnitude
  spans modest C shifts (Δ ≈ +0.46 ppm at ASP-1 CA, +0.46 at ASP-1 CB) and
  larger N shifts (Δ ≈ −2.23 ppm at ASP-1 N: 121.53 → 119.30; same Δ at
  GLY-2 N: 109.23 → 107.0). Pattern consistent with N reference change
  applied to the deposition.
- NAME_TRANSLATION_APPLIED: 32 (routine HN/HA1-HA2/HB1-HB2 translations).
- UNMATCHED_NAME: 1 (ASP-1 H — same as BMRB, document-and-carry).

Cross-cutting: BMRB CSV value = RefDB corrected for all 96 corrected rows.
The two databases are operationally equivalent on shift values; RefDB's
unique role is the original_value column as the change-log.
"""

