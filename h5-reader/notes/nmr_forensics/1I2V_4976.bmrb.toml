  → protonation untestable (third HSP exemplar with same pattern).
- §6.3 deferred — 0 STEREO_AMBIGUOUS but **silently ambiguous**:
  depositor put no ambig codes on any row (1G26 pattern).
- §6.1 adjudicated (none).

Cross-cutting: 0 RefDB corrections — trivially consistent.
"""

