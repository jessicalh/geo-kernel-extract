# Provenance block — 1I2V_4976 BMRB translation (narrative)
#
# Protein: Heliomicin-LL — antifungal and antibacterial MUTANT of heliomicin
# (insect defensin antimicrobial peptide). 44-residue. PDB 1I2V deposited
# 2001-02-12; ENGINEERED YES, MUTATION YES. tag_alignment.json: tag_free=true;
# bmrb_sequence (44aa, DKLIGSCVWGAVNYTSDCNGECLLRGYKGGHCGSFANVNCWCET) ==
# native_sequence (44aa); identity.
#
# Numbering: identity. offset = 0.
#
# **HSP at residue 31** (CHARMM doubly-protonated). BMRB rows for HIS-31:
# H, HA, HB2, HB3, HD2 (7.08 ppm), HE1 (8.49 ppm) — ring N-Hs (HD1, HE2)
# absent. Same untestable-protonation pattern as 1G26-HSP-3 and
# 1CBH-HSP-4. 6 RESIDUE_ALIAS_APPLIED expected.
#
# ASP-1 N-terminus: CHARMM has H1/H2/H3 (NH3+); BMRB row 1 deposits HA,
# HB2, HB3 only — silent-omit N-term (1HD6/1B1V/1G26/1CBH family).
#
# 6 CYS at residues 7, 18, 22, 32, 40, 42 — likely 3 disulfide bridges
# in the cysteine-stabilised α/β defensin fold.
#
# **Ambig codes ALL EMPTY** in BMRB 4976 (237 rows, no ambiguity_code
# value on any row). Same depositor pattern as 1G26 — 0 STEREO_AMBIGUOUS
# will fire, but this is silence-of-the-depositor, not absence of stereo
# ambiguity in the underlying assignment.

