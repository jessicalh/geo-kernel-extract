1I2V_4976 — Heliomicin-LL antifungal/antibacterial mutant of heliomicin
(insect defensin), 44-residue. Identity numbering, offset = 0. 237 BMRB
rows all H.

Audit run 2026-04-20: 237 rows = 79 MATCHED + 140 MATCHED_WITH_ANOMALIES
+ 18 ONE_TO_MANY + 0 STEREO_AMBIGUOUS + 0 UNMATCHED. Anomalies: 137
NAME_TRANSLATION_APPLIED, 18 ONE_TO_MANY, 6 RESIDUE_ALIAS_APPLIED
(HSP→HIS at residue 31). CHARMM coverage: H 273/296 (92%); C/N/O/S 0.

Resolutions (PRINCIPLES §6):
- §6.4 document-and-carry (0 rows): no UNMATCHED. ASP-1 silent N-term
  (rows HA, HB2, HB3 only).
- §6.3 deferred (18 rows): ONE_TO_MANY methyl-pseudo expansion.
- §6.3 deferred (6 rows): RESIDUE_ALIAS_APPLIED on HIS-31 (HSP→HIS); all
