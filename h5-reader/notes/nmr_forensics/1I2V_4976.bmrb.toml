    "prep/tag_alignment.json: tag_free=true; bmrb_sequence (44aa) == native_sequence (44aa); chain A length 44; alignment_matches=44",
    "BMRB CSV inspection: 237 rows for bmrb_id=4976, all H; residues 1..44 names align with CHARMM 1..44 identity (modulo HSP→HIS at residue 31)",
    "HIS-31 BMRB rows: H, HA, HB2, HB3, HD2 (7.08), HE1 (8.49) — ring N-Hs absent; protonation untestable",
    "ASP-1 BMRB rows: HA, HB2, HB3 — silent N-term omit",
