# EEQ D4 Element Parameters — Reference Data
#
# Source: Caldeweyher, Ehlert, Hansen, Neugebauer, Spicher, Bannwarth
# & Grimme, J. Chem. Phys. 150, 154122 (2019).
# DOI: 10.1063/1.5090222
#
# Reference implementation: github.com/dftd4/dftd4 (Apache-2.0)
# Parameter files: src/dftd4/data/{en,hardness,rad,rcov}.f90
#
# All values in atomic units (Hartree, Bohr).
# Fitted to reproduce Hirshfeld charges from DFT/def2-TZVP.
# Same parameters used in TURBOMOLE, ORCA D4, xTB, DFTB+.
#
# These are REFERENCE DATA, not tuneable parameters.  Do not modify
# without citing a different parameterisation.  The C++ code in
# EeqResult.cpp compiles these values directly.  This file exists
# for auditability — the examiner can compare against Table S1.
#
# Coulomb kernel: Ohno-Klopman (1964), gamma(R) = 1/sqrt(R^2 + 1/(gam_i*gam_j))
# This is a deliberate simplification of the dftd4 Gaussian-charge form
# erf(alpha*R)/R.  See EeqResult.cpp for justification.
#
# Coordination number: erfc-based counting (Caldeweyher 2019 Eq. 6)
# CN_i = sum_{j!=i} 0.5 * erfc(k * (R_ij/(rcov_i + rcov_j) - 1))
# Default k = 7.5 (eeq_cn_steepness in calculator_params.toml)
#
# Effective electronegativity: chi_eff = chi + kappa * sqrt(CN + 1e-14)
#
# Diagonal correction: A_ii = gam + sqrt(2/pi) / rad
# Ensures positive definiteness of the Coulomb matrix.

[H]
chi   = -0.35015861   # electronegativity [Hartree]
gam   =  0.47259288   # chemical hardness (Hubbard U) [Hartree]
kappa = -0.19793756   # CN-dependent EN shift [Hartree]
rcov  =  0.80628      # covalent radius for CN counting [Bohr] (Pyykko 2009)
rad   =  1.61478      # Gaussian charge width [Bohr]

[C]
chi   = -0.04726052
gam   =  0.25364654
kappa =  0.14216971
rcov  =  1.51718
rad   =  2.49988

